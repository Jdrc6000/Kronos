<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Kronos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=IBM+Plex+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f5ede0;
            --s1: #ede4d4;
            --s2: #e4dac8;
            --s3: #d8cebc;
            --ink: #1a1a1a;
            --ink-dim: #888;
            --ink-faint: #c8bfb0;
            --orange: #e05a1e;
            --teal: #1e7fa8;
            --yellow: #c4b820;
            --ff-disp: 'Playfair Display', serif;
            --ff: 'IBM Plex Mono', monospace;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--ff);
            font-size: 13px
        }

        @keyframes fi {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            animation: fi .5s ease both
        }

        .riso-circle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none
        }

        .lock-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 360px
        }

        .lock-title {
            font-family: var(--ff-disp);
            font-size: 4rem;
            font-weight: 900;
            color: var(--ink);
            line-height: .9;
            letter-spacing: -.03em;
            margin-bottom: .2rem
        }

        .lock-title-tint {
            color: var(--orange)
        }

        .lock-sub {
            font-size: .6rem;
            color: var(--ink-dim);
            letter-spacing: .2em;
            text-transform: uppercase;
            margin-bottom: 2rem
        }

        .lock-form {
            border-top: 2px solid var(--ink);
            padding-top: 1.2rem
        }

        .field-label {
            display: block;
            font-size: .58rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--ink-dim);
            margin-bottom: .3rem
        }

        .field-group {
            margin-bottom: 1rem
        }

        .input-wrap {
            position: relative
        }

        input[type="password"],
        input[type="text"],
        input[type="search"] {
            width: 100%;
            background: transparent;
            border: 1.5px solid var(--ink);
            color: var(--ink);
            font-family: var(--ff);
            font-size: .82rem;
            padding: .55rem 2.2rem .55rem .7rem;
            outline: none;
            transition: border-color .15s;
            letter-spacing: .04em;
        }

        input:focus {
            border-color: var(--orange)
        }

        input::placeholder {
            color: var(--ink-faint)
        }

        .eye-btn {
            position: absolute;
            right: .5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--ink-dim);
            cursor: pointer;
            font-size: .75rem;
            transition: color .15s
        }

        .eye-btn:hover {
            color: var(--orange)
        }

        .btn-primary {
            width: 100%;
            padding: .65rem;
            background: var(--ink);
            border: none;
            color: var(--bg);
            font-family: var(--ff);
            font-size: .68rem;
            letter-spacing: .25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .15s
        }

        .btn-primary:hover {
            background: var(--orange)
        }

        .btn-primary:disabled {
            background: var(--ink-faint);
            cursor: not-allowed
        }

        .status-msg {
            margin-top: .6rem;
            font-size: .62rem;
            letter-spacing: .08em;
            min-height: 1rem
        }

        .status-msg.error {
            color: #c04020
        }

        .status-msg.info {
            color: var(--ink-dim)
        }

        .settings-link {
            display: block;
            font-size: .55rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--ink-faint);
            text-decoration: none;
            margin-top: 1.2rem;
            transition: color .15s
        }

        .settings-link:hover {
            color: var(--ink)
        }

        #vault-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: .6rem 1.5rem;
            border-bottom: 2px solid var(--ink);
            background: var(--bg)
        }

        .topbar-brand {
            font-family: var(--ff-disp);
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--ink);
            margin-right: 1.5rem;
            letter-spacing: -.02em
        }

        .topbar-brand span {
            color: var(--orange)
        }

        .topbar-meta {
            flex: 1;
            font-size: .6rem;
            color: var(--ink-dim)
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        .save-indicator {
            font-size: .58rem;
            color: var(--ink-faint);
            display: flex;
            align-items: center;
            gap: .35rem
        }

        .save-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ink-faint)
        }

        .save-dot.saving {
            background: var(--yellow);
            animation: blink .7s infinite
        }

        .save-dot.saved {
            background: var(--teal)
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .2
            }
        }

        .btn-sm {
            background: transparent;
            border: 1.5px solid var(--ink-faint);
            color: var(--ink-dim);
            font-family: var(--ff);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .3rem .7rem;
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
            display: inline-block
        }

        .btn-sm:hover {
            border-color: var(--ink);
            color: var(--ink)
        }

        .btn-sm.danger:hover {
            border-color: var(--orange);
            color: var(--orange)
        }

        .vault-body {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1px 1fr;
            height: calc(100vh - 45px)
        }

        .sidebar {
            background: var(--s1);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .sidebar-search {
            padding: .5rem .8rem;
            border-bottom: 1px solid var(--s2)
        }

        .sidebar-search input {
            border: 1.5px solid var(--s3);
            font-size: .72rem
        }

        .entry-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--s3) transparent
        }

        .entry-item {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem .8rem;
            border-bottom: 1px solid var(--s2);
            cursor: pointer;
            transition: background .1s
        }

        .entry-item:hover {
            background: var(--s2)
        }

        .entry-item.active {
            background: var(--s2);
            border-left: 2px solid var(--orange)
        }

        .entry-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .entry-info {
            flex: 1;
            min-width: 0
        }

        .entry-name {
            font-family: var(--ff-disp);
            font-size: .88rem;
            font-weight: 900;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .entry-username {
            font-size: .6rem;
            color: var(--ink-dim);
            margin-top: .1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .entry-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-faint);
            font-size: .65rem;
            opacity: 0;
            transition: all .15s;
            flex-shrink: 0;
            font-family: var(--ff)
        }

        .entry-item:hover .entry-delete-btn {
            opacity: 1
        }

        .entry-delete-btn:hover {
            color: var(--orange)
        }

        .zero-state {
            padding: 2rem .8rem;
            font-size: .6rem;
            color: var(--ink-faint);
            letter-spacing: .12em;
            text-align: center;
            line-height: 2.2;
            text-transform: uppercase
        }

        .sidebar-footer {
            padding: .65rem .8rem;
            border-top: 1px solid var(--s3)
        }

        .btn-add {
            width: 100%;
            background: transparent;
            border: 1.5px dashed var(--s3);
            color: var(--ink-dim);
            font-family: var(--ff);
            font-size: .62rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            padding: .5rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-add:hover {
            border-color: var(--orange);
            color: var(--orange)
        }

        .col-div {
            background: var(--ink)
        }

        .detail-panel {
            overflow-y: auto;
            padding: 2rem;
            background: var(--bg);
            position: relative
        }

        .empty-state {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .empty-state-text {
            font-family: var(--ff-disp);
            font-style: italic;
            font-size: 1.2rem;
            color: var(--ink-faint)
        }

        .detail-card {
            display: none;
            animation: fi .2s ease both;
            position: relative;
            z-index: 1
        }

        .detail-card.visible {
            display: block
        }

        .detail-title-area {
            margin-bottom: 1.2rem
        }

        .detail-site-name {
            font-family: var(--ff-disp);
            font-size: 2rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1;
            letter-spacing: -.02em
        }

        .detail-site-url {
            font-size: .62rem;
            color: var(--ink-dim);
            margin-top: .2rem
        }

        .detail-rule {
            height: 2px;
            background: var(--ink);
            margin: .8rem 0;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .detail-rule-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .detail-header-actions {
            display: flex;
            align-items: center;
            gap: .8rem;
            margin-bottom: 1.2rem
        }

        .btn-edit {
            background: transparent;
            border: 1.5px solid var(--ink-faint);
            color: var(--ink-dim);
            font-family: var(--ff);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .3rem .7rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-edit:hover {
            border-color: var(--ink);
            color: var(--ink)
        }

        .data-section {
            margin-bottom: .8rem
        }

        .data-section-label {
            font-size: .55rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--orange);
            margin-bottom: .4rem
        }

        .data-row {
            display: flex;
            align-items: stretch;
            border: 1.5px solid var(--ink)
        }

        .data-label {
            font-size: .58rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-dim);
            padding: .5rem .6rem;
            background: var(--s1);
            border-right: 1.5px solid var(--ink);
            min-width: 90px;
            display: flex;
            align-items: center
        }

        .data-value {
            flex: 1;
            padding: .5rem .6rem;
            font-size: .82rem;
            color: var(--ink);
            word-break: break-all
        }

        .data-value.masked {
            letter-spacing: .18em;
            color: var(--ink-faint)
        }

        .data-actions {
            display: flex;
            border-left: 1.5px solid var(--ink)
        }

        .data-btn {
            background: none;
            border: none;
            border-left: 1.5px solid var(--ink);
            cursor: pointer;
            padding: 0 .65rem;
            font-family: var(--ff);
            font-size: .55rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-dim);
            transition: all .15s;
            white-space: nowrap
        }

        .data-btn:first-child {
            border-left: none
        }

        .data-btn:hover,
        .data-btn.copied {
            background: var(--ink);
            color: var(--bg)
        }

        .pw-strength {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .3rem .6rem;
            border: 1.5px solid var(--ink);
            border-top: none;
            margin-bottom: .8rem;
            background: var(--s1)
        }

        .pw-strength-bar {
            flex: 1;
            height: 2px;
            background: var(--s3)
        }

        .pw-strength-fill {
            height: 100%;
            transition: width .4s, background .4s
        }

        .pw-strength-label {
            font-size: .55rem;
            color: var(--ink-dim);
            letter-spacing: .1em;
            text-transform: uppercase
        }

        .detail-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: .6rem;
            color: var(--ink-faint);
            font-family: var(--ff);
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-top: .8rem;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color .15s
        }

        .detail-delete-btn:hover {
            color: var(--orange)
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 26, .6);
            z-index: 100;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex;
            animation: fi .15s ease both
        }

        .modal {
            background: var(--bg);
            border: 2px solid var(--ink);
            width: 100%;
            max-width: 440px
        }

        .modal-head {
            background: var(--ink);
            padding: .6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .modal-title {
            font-family: var(--ff-disp);
            font-size: .95rem;
            font-style: italic;
            color: var(--bg)
        }

        .modal-close {
            background: none;
            border: none;
            color: rgba(245, 237, 224, .5);
            cursor: pointer;
            font-size: .9rem;
            font-family: var(--ff);
            transition: color .15s
        }

        .modal-close:hover {
            color: var(--bg)
        }

        .modal-body {
            padding: 1.2rem 1rem
        }

        .gen-btn {
            width: 100%;
            margin-top: .4rem;
            background: transparent;
            border: 1px dashed var(--ink-faint);
            color: var(--ink-dim);
            font-family: var(--ff);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .35rem;
            cursor: pointer;
            transition: all .15s
        }

        .gen-btn:hover {
            border-color: var(--teal);
            color: var(--teal)
        }

        .modal-actions {
            display: flex;
            border-top: 1.5px solid var(--ink)
        }

        .modal-btn {
            flex: 1;
            padding: .6rem;
            background: transparent;
            border: none;
            border-right: 1.5px solid var(--ink);
            color: var(--ink-dim);
            cursor: pointer;
            font-family: var(--ff);
            font-size: .6rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            transition: all .15s
        }

        .modal-btn:last-child {
            border-right: none
        }

        .modal-btn:hover {
            color: var(--ink)
        }

        .modal-btn.primary {
            color: var(--ink)
        }

        .modal-btn.primary:hover {
            background: var(--ink);
            color: var(--bg)
        }

        #toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--ink);
            color: var(--bg);
            padding: .45rem 1.1rem;
            font-family: var(--ff);
            font-size: .62rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .spinner {
            display: inline-block;
            width: 11px;
            height: 11px;
            border: 1.5px solid var(--ink-faint);
            border-top-color: var(--bg);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: .4rem
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--s3)
        }
    </style>
</head>

<body>
    <div class="riso-circle"
        style="width:300px;height:300px;background:var(--orange);top:-120px;right:-80px;opacity:.12"></div>
    <div class="riso-circle" style="width:200px;height:200px;background:var(--teal);top:-60px;right:-30px;opacity:.12">
    </div>
    <div id="lock-screen">
        <div class="lock-content">
            <div class="lock-title">Kro<span class="lock-title-tint">nos</span></div>
            <div class="lock-sub">password vault — 2026</div>
            <div class="lock-form">
                <div class="field-group"><label class="field-label" for="master-pw">passphrase</label>
                    <div class="input-wrap"><input type="password" id="master-pw" autocomplete="current-password"
                            placeholder="enter passphrase…" /><button class="eye-btn"
                            onclick="K.togglePwVisibility('master-pw')">👁</button></div>
                </div>
                <button class="btn-primary" id="unlock-btn" onclick="K.unlock()">unlock</button>
                <div class="status-msg info" id="lock-status"></div>
            </div>
            <a href="../settings.html" class="settings-link">⚙ change theme</a>
        </div>
    </div>
    <div id="vault-screen">
        <div class="topbar">
            <div class="topbar-brand">Kro<span>nos</span></div>
            <div class="topbar-meta"><span id="entry-count">0</span> entries</div>
            <div class="topbar-actions">
                <div class="save-indicator">
                    <div class="save-dot saved" id="save-dot"></div><span id="save-label">saved</span>
                </div>
                <a href="../settings.html" class="btn-sm">theme</a>
                <button class="btn-sm danger" onclick="K.lock()">lock</button>
            </div>
        </div>
        <div class="vault-body">
            <div class="sidebar">
                <div class="sidebar-search"><input type="search" id="search-input" placeholder="search…"
                        oninput="K.renderList()" /></div>
                <div class="entry-list" id="entry-list">
                    <div class="zero-state" id="zero-state">no entries yet.<br>add your first.</div>
                </div>
                <div class="sidebar-footer"><button class="btn-add" onclick="K.openAddModal()">+ add entry</button>
                </div>
            </div>
            <div class="col-div"></div>
            <div class="detail-panel">
                <div class="riso-circle"
                    style="width:400px;height:400px;background:var(--orange);bottom:-150px;right:-100px;opacity:.07">
                </div>
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-text">select an entry</div>
                </div>
                <div class="detail-card" id="detail-card">
                    <div class="detail-title-area">
                        <div class="detail-site-name" id="detail-name"></div>
                        <div class="detail-site-url" id="detail-url-val"></div>
                    </div>
                    <div class="detail-rule">
                        <div class="detail-rule-dot" style="background:var(--orange)"></div>
                        <div class="detail-rule-dot" style="background:var(--teal)"></div>
                    </div>
                    <div class="detail-header-actions">
                        <button class="btn-edit" onclick="K.openEditModal()">edit</button>
                    </div>
                    <div class="data-section" id="detail-username-section">
                        <div class="data-section-label">identity</div>
                        <div class="data-row">
                            <div class="data-label">username</div>
                            <div class="data-value" id="detail-username-val"></div>
                            <div class="data-actions"><button class="data-btn"
                                    onclick="copyValEl('detail-username-val',this)">copy</button></div>
                        </div>
                    </div>
                    <div class="data-section">
                        <div class="data-section-label">authentication</div>
                        <div class="data-row">
                            <div class="data-label">password</div>
                            <div class="data-value masked" id="detail-pw-val">••••••••••••</div>
                            <div class="data-actions"><button class="data-btn" id="pw-reveal-btn"
                                    onclick="K.toggleReveal()">show</button><button class="data-btn"
                                    onclick="K.copyPassword()">copy</button></div>
                        </div>
                        <div class="pw-strength">
                            <div class="pw-strength-bar">
                                <div class="pw-strength-fill" id="pw-strength-fill"></div>
                            </div><span class="pw-strength-label" id="pw-strength-label"></span>
                        </div>
                    </div>
                    <div class="data-section" id="detail-notes-section" style="display:none">
                        <div class="data-section-label">notes</div>
                        <div class="data-row">
                            <div class="data-label">memo</div>
                            <div class="data-value" id="detail-notes-val"></div>
                        </div>
                    </div>
                    <button class="detail-delete-btn" onclick="deleteActive()">delete entry</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-head">
                <div class="modal-title" id="modal-title">new entry</div><button class="modal-close"
                    onclick="K.closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="field-group"><label class="field-label" for="m-site">site</label><input type="text"
                        id="m-site" placeholder="github.com" /></div>
                <div class="field-group"><label class="field-label" for="m-url">url</label><input type="text" id="m-url"
                        placeholder="https://" /></div>
                <div class="field-group"><label class="field-label" for="m-user">username</label><input type="text"
                        id="m-user" placeholder="you@example.com" /></div>
                <div class="field-group"><label class="field-label" for="m-pw">password</label>
                    <div class="input-wrap"><input type="password" id="m-pw" placeholder="password" /><button
                            class="eye-btn" onclick="K.togglePwVisibility('m-pw')">👁</button></div><button
                        class="gen-btn" onclick="genPw()">generate strong password</button>
                </div>
                <div class="field-group" style="margin-bottom:0"><label class="field-label"
                        for="m-notes">notes</label><input type="text" id="m-notes" placeholder="optional" /></div>
            </div>
            <div class="modal-actions"><button class="modal-btn" onclick="K.closeModal()">cancel</button><button
                    class="modal-btn primary" onclick="doSave()">save</button></div>
        </div>
    </div>
    <div id="toast"></div>
    <script src="kronos-core.js"></script>
    <script>
        const DOTS = ['var(--orange)', 'var(--teal)', 'var(--yellow)', 'var(--ink-faint)'];
        const K = window.KronosCore;
        K.init({
            masterPwInput: document.getElementById('master-pw'), lockScreen: document.getElementById('lock-screen'), vaultScreen: document.getElementById('vault-screen'), searchInput: document.getElementById('search-input'), entryCountEl: document.getElementById('entry-count'),
            onStatus(m, t) { const el = document.getElementById('lock-status'); el.textContent = m; el.className = 'status-msg ' + t; },
            onUnlockLoading(l) { const b = document.getElementById('unlock-btn'); b.disabled = l; b.innerHTML = l ? '<span class="spinner"></span>unlocking…' : 'unlock'; },
            onSaveState(s) { const d = document.getElementById('save-dot'), l = document.getElementById('save-label'); if (s === 'saving') { d.className = 'save-dot saving'; l.textContent = 'saving…'; } else if (s === 'saved') { d.className = 'save-dot saved'; l.textContent = 'saved'; } else { d.className = 'save-dot'; l.textContent = 'error'; } },
            onToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); },
            onRenderList(ids, vault, activeId) { const el = document.getElementById('entry-list'), zs = document.getElementById('zero-state'); el.querySelectorAll('.entry-item').forEach(n => n.remove()); zs.style.display = Object.keys(vault).length === 0 ? 'block' : 'none'; ids.forEach((id, i) => { const e = vault[id], d = document.createElement('div'); d.className = 'entry-item' + (id === activeId ? ' active' : ''); d.dataset.id = id; const dot = DOTS[i % 4]; d.innerHTML = `<div class="entry-dot" style="background:${dot};opacity:.7"></div><div class="entry-info"><div class="entry-name">${K.esc(e.site)}</div><div class="entry-username">${K.esc(e.username || '—')}</div></div><button class="entry-delete-btn" onclick="K.deleteEntry('${id}')">✕</button>`; d.addEventListener('click', ev => { if (!ev.target.classList.contains('entry-delete-btn')) K.showDetail(id); }); el.insertBefore(d, zs); }); },
            onShowDetail(id, entry) { const card = document.getElementById('detail-card'), empty = document.getElementById('empty-state'); if (!entry) { card.classList.remove('visible'); empty.style.display = 'flex'; return; } empty.style.display = 'none'; card.classList.add('visible'); document.getElementById('detail-name').textContent = entry.site; document.getElementById('detail-url-val').textContent = entry.url || ''; const us = document.getElementById('detail-username-section'); if (entry.username) { us.style.display = 'block'; document.getElementById('detail-username-val').textContent = entry.username; } else us.style.display = 'none'; const pwEl = document.getElementById('detail-pw-val'); pwEl.textContent = '••••••••••••'; pwEl.className = 'data-value masked'; document.getElementById('pw-reveal-btn').textContent = 'show'; const sc = K.strengthScore(entry.password); document.getElementById('pw-strength-fill').style.cssText = `width:${sc.pct}%;background:${sc.color}`; document.getElementById('pw-strength-label').textContent = sc.label; const ns = document.getElementById('detail-notes-section'); if (entry.notes) { ns.style.display = 'block'; document.getElementById('detail-notes-val').textContent = entry.notes; } else ns.style.display = 'none'; },
            onToggleReveal(r, pw) { const el = document.getElementById('detail-pw-val'), btn = document.getElementById('pw-reveal-btn'); if (r) { el.textContent = pw; el.className = 'data-value'; btn.textContent = 'hide'; } else { el.textContent = '••••••••••••'; el.className = 'data-value masked'; btn.textContent = 'show'; } },
            onOpenModal(e) { document.getElementById('modal-title').textContent = e ? 'edit entry' : 'new entry'; document.getElementById('m-site').value = e?.site || ''; document.getElementById('m-url').value = e?.url || ''; document.getElementById('m-user').value = e?.username || ''; document.getElementById('m-pw').value = e?.password || ''; document.getElementById('m-notes').value = e?.notes || ''; document.getElementById('modal-overlay').classList.add('open'); setTimeout(() => document.getElementById('m-site').focus(), 50); },
            onCloseModal() { document.getElementById('modal-overlay').classList.remove('open'); }
        });
        function doSave() { K.saveEntry({ site: document.getElementById('m-site').value.trim(), url: document.getElementById('m-url').value.trim(), username: document.getElementById('m-user').value.trim(), password: document.getElementById('m-pw').value, notes: document.getElementById('m-notes').value.trim() }); }
        function genPw() { const pw = K.generatePassword(), el = document.getElementById('m-pw'); el.value = pw; el.type = 'text'; setTimeout(() => el.type = 'password', 2000); }
        function copyValEl(id, btn) { K.copyField(document.getElementById(id).textContent); const o = btn.textContent; btn.textContent = 'copied'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = o; btn.classList.remove('copied'); }, 1500); }
        function deleteActive() { const id = K.getActiveId(); if (id) K.deleteEntry(id); }
    </script>
</body>

</html>
