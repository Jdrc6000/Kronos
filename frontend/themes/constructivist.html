<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Kronos</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #16192e;
            --s1: #1c2040;
            --s2: #232852;
            --s3: #2a3060;
            --red: #b52a2a;
            --red-hi: #d03030;
            --gold: #e8c84a;
            --blue: #2a6bb5;
            --paper: #f0ede0;
            --paper-dim: #c8c4b0;
            --ff: 'Impact', 'Arial Narrow', sans-serif;
            --ffm: 'IBM Plex Mono', monospace;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--paper);
            font-family: var(--ffm);
            font-size: 13px
        }

        @keyframes slam {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.98)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            animation: slam .4s ease both
        }

        .bg-stripe1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: var(--red);
            transform: rotate(-25deg);
            top: -250px;
            right: -150px;
            opacity: .8;
            pointer-events: none;
            z-index: 0
        }

        .bg-stripe2 {
            position: fixed;
            width: 200px;
            height: 600px;
            background: var(--gold);
            transform: rotate(-25deg);
            top: -100px;
            right: -200px;
            opacity: .5;
            pointer-events: none;
            z-index: 0
        }

        .lock-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px
        }

        .lock-title {
            font-family: var(--ff);
            font-size: 5rem;
            font-weight: 900;
            color: var(--paper);
            text-transform: uppercase;
            letter-spacing: .04em;
            line-height: .85;
            margin-bottom: .5rem;
            text-shadow: 4px 4px 0 var(--red)
        }

        .lock-title-accent {
            color: var(--gold)
        }

        .lock-sub {
            font-family: var(--ffm);
            font-size: .6rem;
            letter-spacing: .35em;
            color: var(--paper-dim);
            text-transform: uppercase;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: .8rem
        }

        .lock-sub::before {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--red)
        }

        .lock-form {
            background: var(--s1);
            border: 2px solid rgba(240, 237, 224, .1);
            padding: 1.5rem
        }

        .lock-form-header {
            background: var(--red);
            color: var(--paper);
            font-family: var(--ff);
            font-size: .8rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            padding: .4rem .8rem;
            margin: -1.5rem -1.5rem 1.2rem
        }

        .field-label {
            display: block;
            font-size: .58rem;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--paper-dim);
            margin-bottom: .35rem
        }

        .field-group {
            margin-bottom: 1.2rem
        }

        .input-wrap {
            position: relative
        }

        input[type="password"],
        input[type="text"],
        input[type="search"] {
            width: 100%;
            background: var(--bg);
            border: 2px solid rgba(240, 237, 224, .15);
            color: var(--paper);
            font-family: var(--ffm);
            font-size: .82rem;
            padding: .6rem 2.2rem .6rem .7rem;
            outline: none;
            transition: border-color .15s;
            letter-spacing: .04em;
        }

        input:focus {
            border-color: var(--gold)
        }

        input::placeholder {
            color: rgba(200, 196, 176, .3)
        }

        .eye-btn {
            position: absolute;
            right: .5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--paper-dim);
            cursor: pointer;
            font-size: .75rem;
            transition: color .15s
        }

        .eye-btn:hover {
            color: var(--gold)
        }

        .btn-primary {
            width: 100%;
            padding: .7rem;
            background: var(--red);
            border: none;
            color: var(--paper);
            font-family: var(--ff);
            font-size: .85rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%)
        }

        .btn-primary:hover {
            background: var(--red-hi)
        }

        .btn-primary:disabled {
            background: rgba(181, 42, 42, .4);
            cursor: not-allowed
        }

        .status-msg {
            margin-top: .6rem;
            font-size: .62rem;
            letter-spacing: .1em;
            min-height: 1rem
        }

        .status-msg.error {
            color: #e08080
        }

        .status-msg.info {
            color: var(--paper-dim)
        }

        .settings-link {
            font-size: .55rem;
            letter-spacing: .2em;
            color: rgba(200, 196, 176, .4);
            text-decoration: none;
            display: block;
            text-align: right;
            margin-top: .8rem;
            text-transform: uppercase;
            transition: color .15s
        }

        .settings-link:hover {
            color: var(--gold)
        }

        #vault-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh
        }

        .topbar {
            background: var(--s1);
            border-bottom: 2px solid var(--red);
            padding: .6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden
        }

        .topbar::after {
            content: '';
            position: absolute;
            right: -30px;
            top: -30px;
            width: 80px;
            height: 80px;
            background: var(--gold);
            transform: rotate(45deg);
            opacity: .15;
            pointer-events: none
        }

        .topbar-brand {
            font-family: var(--ff);
            font-size: 1.3rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--paper)
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            z-index: 1
        }

        .save-indicator {
            font-size: .58rem;
            letter-spacing: .12em;
            color: var(--paper-dim);
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .save-dot {
            width: 5px;
            height: 5px;
            background: var(--paper-dim)
        }

        .save-dot.saving {
            background: var(--gold);
            animation: blink .7s infinite
        }

        .save-dot.saved {
            background: #4a8a5a
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .2
            }
        }

        .btn-sm {
            background: transparent;
            border: 2px solid rgba(240, 237, 224, .2);
            color: var(--paper-dim);
            font-family: var(--ffm);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .3rem .8rem;
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
            display: inline-block
        }

        .btn-sm:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .btn-sm.danger:hover {
            border-color: var(--red);
            color: #e08080
        }

        .vault-body {
            flex: 1;
            display: grid;
            grid-template-columns: 270px 2px 1fr;
            height: calc(100vh - 48px)
        }

        .sidebar {
            background: var(--s1);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .sidebar-head-bar {
            background: var(--red);
            padding: .25rem .8rem;
            font-family: var(--ff);
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--paper);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .sidebar-search {
            padding: .5rem .7rem;
            border-bottom: 1px solid rgba(240, 237, 224, .1)
        }

        .sidebar-search input {
            background: var(--bg);
            border: 1px solid rgba(240, 237, 224, .15);
            font-size: .75rem
        }

        .entry-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(240, 237, 224, .1) transparent
        }

        .entry-item {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid rgba(240, 237, 224, .06);
            cursor: pointer;
            transition: background .1s
        }

        .entry-item:hover {
            background: var(--s2)
        }

        .entry-item.active {
            background: var(--s2)
        }

        .entry-bar {
            width: 4px;
            flex-shrink: 0
        }

        .entry-body {
            flex: 1;
            padding: .6rem .7rem;
            min-width: 0
        }

        .entry-name {
            font-family: var(--ff);
            font-size: .88rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--paper);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .entry-username {
            font-size: .6rem;
            color: var(--paper-dim);
            margin-top: .1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .entry-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(240, 237, 224, .2);
            font-size: .65rem;
            opacity: 0;
            transition: all .15s;
            padding: 0 .6rem;
            flex-shrink: 0;
            font-family: var(--ffm)
        }

        .entry-item:hover .entry-delete-btn {
            opacity: 1
        }

        .entry-delete-btn:hover {
            color: #e08080
        }

        .zero-state {
            padding: 2rem .8rem;
            font-size: .62rem;
            color: rgba(200, 196, 176, .3);
            letter-spacing: .12em;
            text-transform: uppercase;
            text-align: center;
            line-height: 2.2
        }

        .sidebar-footer {
            padding: .6rem .7rem;
            border-top: 1px solid rgba(240, 237, 224, .1)
        }

        .btn-add {
            width: 100%;
            background: transparent;
            border: 2px dashed rgba(240, 237, 224, .15);
            color: var(--paper-dim);
            font-family: var(--ffm);
            font-size: .62rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            padding: .5rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-add:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .col-div {
            background: var(--red)
        }

        .detail-panel {
            overflow-y: auto;
            padding: 2rem;
            background: var(--bg)
        }

        .empty-state {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .empty-state-text {
            font-family: var(--ff);
            font-size: 1.5rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: rgba(240, 237, 224, .1)
        }

        .detail-card {
            display: none;
            animation: slam .2s ease both
        }

        .detail-card.visible {
            display: block
        }

        .detail-kicker {
            font-size: .55rem;
            letter-spacing: .35em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: .3rem
        }

        .detail-headline {
            font-family: var(--ff);
            font-size: 2rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--paper);
            line-height: 1;
            margin-bottom: .5rem
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: .8rem;
            padding: .4rem 0;
            border-top: 2px solid var(--red);
            border-bottom: 1px solid rgba(240, 237, 224, .1);
            margin-bottom: 1.5rem
        }

        .detail-meta-item {
            font-size: .58rem;
            letter-spacing: .12em;
            color: var(--paper-dim);
            text-transform: uppercase
        }

        .detail-meta-item strong {
            color: var(--gold);
            display: block;
            font-size: .65rem
        }

        .btn-edit {
            background: none;
            border: 2px solid rgba(240, 237, 224, .2);
            color: var(--paper-dim);
            font-family: var(--ffm);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .3rem .7rem;
            cursor: pointer;
            transition: all .15s;
            margin-left: auto
        }

        .btn-edit:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .data-section {
            margin-bottom: 1rem
        }

        .data-section-label {
            background: var(--red);
            color: var(--paper);
            font-family: var(--ff);
            font-size: .62rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            padding: .2rem .6rem;
            display: inline-block;
            margin-bottom: 0
        }

        .data-row {
            display: flex;
            align-items: stretch;
            border: 1px solid rgba(240, 237, 224, .1);
            border-top: none
        }

        .data-label {
            font-size: .55rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--paper-dim);
            padding: .5rem .6rem;
            background: var(--s1);
            border-right: 1px solid rgba(240, 237, 224, .1);
            min-width: 95px;
            display: flex;
            align-items: center
        }

        .data-value {
            flex: 1;
            padding: .5rem .6rem;
            font-size: .8rem;
            color: var(--paper);
            word-break: break-all
        }

        .data-value.masked {
            letter-spacing: .18em;
            color: rgba(240, 237, 224, .3)
        }

        .data-actions {
            display: flex;
            border-left: 1px solid rgba(240, 237, 224, .1)
        }

        .data-btn {
            background: none;
            border: none;
            border-left: 1px solid rgba(240, 237, 224, .1);
            cursor: pointer;
            padding: 0 .65rem;
            font-family: var(--ffm);
            font-size: .52rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--paper-dim);
            transition: all .15s;
            white-space: nowrap
        }

        .data-btn:first-child {
            border-left: none
        }

        .data-btn:hover,
        .data-btn.copied {
            color: var(--gold)
        }

        .pw-strength {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .3rem .6rem;
            border: 1px solid rgba(240, 237, 224, .1);
            border-top: none;
            margin-bottom: .8rem;
            background: var(--s1)
        }

        .pw-strength-bar {
            flex: 1;
            height: 2px;
            background: rgba(240, 237, 224, .1)
        }

        .pw-strength-fill {
            height: 100%;
            transition: width .4s, background .4s
        }

        .pw-strength-label {
            font-size: .52rem;
            color: var(--paper-dim);
            letter-spacing: .1em;
            text-transform: uppercase
        }

        .detail-delete-btn {
            background: none;
            border: 2px solid rgba(240, 237, 224, .1);
            color: rgba(240, 237, 224, .3);
            font-family: var(--ffm);
            font-size: .55rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .25rem .6rem;
            cursor: pointer;
            transition: all .15s;
            margin-top: 1rem
        }

        .detail-delete-btn:hover {
            border-color: var(--red);
            color: #e08080
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 100;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex;
            animation: slam .15s ease both
        }

        .modal {
            background: var(--s1);
            border: 2px solid rgba(240, 237, 224, .15);
            width: 100%;
            max-width: 440px
        }

        .modal-head {
            background: var(--red);
            padding: .6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .modal-title {
            font-family: var(--ff);
            font-size: .9rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--paper)
        }

        .modal-close {
            background: none;
            border: none;
            color: rgba(240, 237, 224, .6);
            cursor: pointer;
            font-size: .9rem;
            font-family: var(--ffm);
            transition: color .15s
        }

        .modal-close:hover {
            color: var(--paper)
        }

        .modal-body {
            padding: 1.2rem 1rem
        }

        .gen-btn {
            width: 100%;
            margin-top: .4rem;
            background: transparent;
            border: 1px dashed rgba(240, 237, 224, .15);
            color: var(--paper-dim);
            font-family: var(--ffm);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .35rem;
            cursor: pointer;
            transition: all .15s
        }

        .gen-btn:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .modal-actions {
            display: flex;
            border-top: 1px solid rgba(240, 237, 224, .1)
        }

        .modal-btn {
            flex: 1;
            padding: .6rem;
            background: transparent;
            border: none;
            border-right: 1px solid rgba(240, 237, 224, .1);
            color: var(--paper-dim);
            cursor: pointer;
            font-family: var(--ffm);
            font-size: .6rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            transition: all .15s
        }

        .modal-btn:last-child {
            border-right: none
        }

        .modal-btn:hover {
            color: var(--paper)
        }

        .modal-btn.primary {
            color: var(--gold)
        }

        .modal-btn.primary:hover {
            background: var(--red);
            color: var(--paper)
        }

        #toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--red);
            color: var(--paper);
            padding: .4rem 1rem;
            font-family: var(--ffm);
            font-size: .62rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .spinner {
            display: inline-block;
            width: 11px;
            height: 11px;
            border: 1.5px solid rgba(240, 237, 224, .3);
            border-top-color: var(--paper);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: .4rem
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        ::-webkit-scrollbar {
            width: 3px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(240, 237, 224, .1)
        }
    </style>
</head>

<body>
    <div id="lock-screen">
        <div class="bg-stripe1"></div>
        <div class="bg-stripe2"></div>
        <div class="lock-content">
            <div class="lock-title">KRO<br><span class="lock-title-accent">NOS</span></div>
            <div class="lock-sub">Zero-knowledge vault system</div>
            <div class="lock-form">
                <div class="lock-form-header">— Authentication Required —</div>
                <div class="field-group"><label class="field-label" for="master-pw">Master Passphrase</label>
                    <div class="input-wrap"><input type="password" id="master-pw" autocomplete="current-password"
                            placeholder="Enter passphrase…" /><button class="eye-btn"
                            onclick="K.togglePwVisibility('master-pw')">👁</button></div>
                </div>
                <button class="btn-primary" id="unlock-btn" onclick="K.unlock()">Unlock Vault</button>
                <div class="status-msg info" id="lock-status"></div>
            </div>
            <a href="../settings.html" class="settings-link">⚙ Change Theme</a>
        </div>
    </div>
    <div id="vault-screen">
        <div class="topbar">
            <div class="topbar-brand">Kronos</div>
            <div class="topbar-actions">
                <div class="save-indicator">
                    <div class="save-dot saved" id="save-dot"></div><span id="save-label">Saved</span>
                </div>
                <a href="../settings.html" class="btn-sm">Theme</a>
                <button class="btn-sm danger" onclick="K.lock()">Lock</button>
            </div>
        </div>
        <div class="vault-body">
            <div class="sidebar">
                <div class="sidebar-head-bar"><span>Entries — <span id="entry-count">0</span></span><span
                        onclick="K.openAddModal()" style="cursor:pointer;color:var(--gold)">+ New</span></div>
                <div class="sidebar-search"><input type="search" id="search-input" placeholder="Search…"
                        oninput="K.renderList()" /></div>
                <div class="entry-list" id="entry-list">
                    <div class="zero-state" id="zero-state">No entries.<br>Add your first.</div>
                </div>
                <div class="sidebar-footer"><button class="btn-add" onclick="K.openAddModal()">+ Add Entry</button>
                </div>
            </div>
            <div class="col-div"></div>
            <div class="detail-panel">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-text">Select</div>
                </div>
                <div class="detail-card" id="detail-card">
                    <div class="detail-kicker">Credential Record</div>
                    <div class="detail-headline" id="detail-name"></div>
                    <div class="detail-meta">
                        <div class="detail-meta-item">URL <strong id="detail-url-val">—</strong></div>
                        <div class="detail-meta-item">Status <strong style="color:#4a8a5a">Active</strong></div>
                        <button class="btn-edit" onclick="K.openEditModal()">Edit</button>
                    </div>
                    <div class="data-section" id="detail-username-section">
                        <div class="data-section-label">Identity</div>
                        <div class="data-row">
                            <div class="data-label">Username</div>
                            <div class="data-value" id="detail-username-val"></div>
                            <div class="data-actions"><button class="data-btn"
                                    onclick="copyValEl('detail-username-val',this)">Copy</button></div>
                        </div>
                    </div>
                    <div class="data-section">
                        <div class="data-section-label">Authentication</div>
                        <div class="data-row">
                            <div class="data-label">Password</div>
                            <div class="data-value masked" id="detail-pw-val">••••••••••••</div>
                            <div class="data-actions"><button class="data-btn" id="pw-reveal-btn"
                                    onclick="K.toggleReveal()">Show</button><button class="data-btn"
                                    onclick="K.copyPassword()">Copy</button></div>
                        </div>
                        <div class="pw-strength">
                            <div class="pw-strength-bar">
                                <div class="pw-strength-fill" id="pw-strength-fill"></div>
                            </div><span class="pw-strength-label" id="pw-strength-label"></span>
                        </div>
                    </div>
                    <div class="data-section" id="detail-notes-section" style="display:none">
                        <div class="data-section-label">Notes</div>
                        <div class="data-row">
                            <div class="data-label">Memo</div>
                            <div class="data-value" id="detail-notes-val"></div>
                        </div>
                    </div>
                    <button class="detail-delete-btn" onclick="deleteActive()">Delete Record</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-head">
                <div class="modal-title" id="modal-title">New Entry</div><button class="modal-close"
                    onclick="K.closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="field-group"><label class="field-label" for="m-site">Site</label><input type="text"
                        id="m-site" placeholder="github.com" /></div>
                <div class="field-group"><label class="field-label" for="m-url">URL</label><input type="text" id="m-url"
                        placeholder="https://" /></div>
                <div class="field-group"><label class="field-label" for="m-user">Username</label><input type="text"
                        id="m-user" placeholder="you@example.com" /></div>
                <div class="field-group"><label class="field-label" for="m-pw">Password</label>
                    <div class="input-wrap"><input type="password" id="m-pw" placeholder="Password" /><button
                            class="eye-btn" onclick="K.togglePwVisibility('m-pw')">👁</button></div><button
                        class="gen-btn" onclick="genPw()">⚙ Generate Strong Password</button>
                </div>
                <div class="field-group" style="margin-bottom:0"><label class="field-label"
                        for="m-notes">Notes</label><input type="text" id="m-notes" placeholder="Optional" /></div>
            </div>
            <div class="modal-actions"><button class="modal-btn" onclick="K.closeModal()">Cancel</button><button
                    class="modal-btn primary" onclick="doSave()">Save Entry</button></div>
        </div>
    </div>
    <div id="toast"></div>
    <script src="kronos-core.js"></script>
    <script>
        const BARS = ['var(--red)', 'var(--gold)', 'var(--blue)', 'rgba(240,237,224,.3)'];
        const K = window.KronosCore;
        K.init({
            masterPwInput: document.getElementById('master-pw'), lockScreen: document.getElementById('lock-screen'), vaultScreen: document.getElementById('vault-screen'), searchInput: document.getElementById('search-input'), entryCountEl: document.getElementById('entry-count'),
            onStatus(m, t) { const el = document.getElementById('lock-status'); el.textContent = m; el.className = 'status-msg ' + t; },
            onUnlockLoading(l) { const b = document.getElementById('unlock-btn'); b.disabled = l; b.innerHTML = l ? '<span class="spinner"></span>Unlocking…' : 'Unlock Vault'; },
            onSaveState(s) { const d = document.getElementById('save-dot'), l = document.getElementById('save-label'); if (s === 'saving') { d.className = 'save-dot saving'; l.textContent = 'Saving…'; } else if (s === 'saved') { d.className = 'save-dot saved'; l.textContent = 'Saved'; } else { d.className = 'save-dot'; l.textContent = 'Error'; } },
            onToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); },
            onRenderList(ids, vault, activeId) { const el = document.getElementById('entry-list'), zs = document.getElementById('zero-state'); el.querySelectorAll('.entry-item').forEach(n => n.remove()); zs.style.display = Object.keys(vault).length === 0 ? 'block' : 'none'; ids.forEach((id, i) => { const e = vault[id], d = document.createElement('div'); d.className = 'entry-item' + (id === activeId ? ' active' : ''); d.dataset.id = id; const bar = BARS[i % 4]; d.innerHTML = `<div class="entry-bar" style="background:${bar}"></div><div class="entry-body"><div class="entry-name">${K.esc(e.site)}</div><div class="entry-username">${K.esc(e.username || '—')}</div></div><button class="entry-delete-btn" onclick="K.deleteEntry('${id}')">✕</button>`; d.addEventListener('click', ev => { if (!ev.target.classList.contains('entry-delete-btn')) K.showDetail(id); }); el.insertBefore(d, zs); }); },
            onShowDetail(id, entry) { const card = document.getElementById('detail-card'), empty = document.getElementById('empty-state'); if (!entry) { card.classList.remove('visible'); empty.style.display = 'flex'; return; } empty.style.display = 'none'; card.classList.add('visible'); document.getElementById('detail-name').textContent = entry.site; document.getElementById('detail-url-val').textContent = entry.url || '—'; const us = document.getElementById('detail-username-section'); if (entry.username) { us.style.display = 'block'; document.getElementById('detail-username-val').textContent = entry.username; } else us.style.display = 'none'; const pwEl = document.getElementById('detail-pw-val'); pwEl.textContent = '••••••••••••'; pwEl.className = 'data-value masked'; document.getElementById('pw-reveal-btn').textContent = 'Show'; const sc = K.strengthScore(entry.password); document.getElementById('pw-strength-fill').style.cssText = `width:${sc.pct}%;background:${sc.color}`; document.getElementById('pw-strength-label').textContent = sc.label; const ns = document.getElementById('detail-notes-section'); if (entry.notes) { ns.style.display = 'block'; document.getElementById('detail-notes-val').textContent = entry.notes; } else ns.style.display = 'none'; },
            onToggleReveal(r, pw) { const el = document.getElementById('detail-pw-val'), btn = document.getElementById('pw-reveal-btn'); if (r) { el.textContent = pw; el.className = 'data-value'; btn.textContent = 'Hide'; } else { el.textContent = '••••••••••••'; el.className = 'data-value masked'; btn.textContent = 'Show'; } },
            onOpenModal(e) { document.getElementById('modal-title').textContent = e ? 'Edit Entry' : 'New Entry'; document.getElementById('m-site').value = e?.site || ''; document.getElementById('m-url').value = e?.url || ''; document.getElementById('m-user').value = e?.username || ''; document.getElementById('m-pw').value = e?.password || ''; document.getElementById('m-notes').value = e?.notes || ''; document.getElementById('modal-overlay').classList.add('open'); setTimeout(() => document.getElementById('m-site').focus(), 50); },
            onCloseModal() { document.getElementById('modal-overlay').classList.remove('open'); }
        });
        function doSave() { K.saveEntry({ site: document.getElementById('m-site').value.trim(), url: document.getElementById('m-url').value.trim(), username: document.getElementById('m-user').value.trim(), password: document.getElementById('m-pw').value, notes: document.getElementById('m-notes').value.trim() }); }
        function genPw() { const pw = K.generatePassword(), el = document.getElementById('m-pw'); el.value = pw; el.type = 'text'; setTimeout(() => el.type = 'password', 2000); }
        function copyValEl(id, btn) { K.copyField(document.getElementById(id).textContent); const o = btn.textContent; btn.textContent = 'Copied'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = o; btn.classList.remove('copied'); }, 1500); }
        function deleteActive() { const id = K.getActiveId(); if (id) K.deleteEntry(id); }
    </script>
</body>

</html>
