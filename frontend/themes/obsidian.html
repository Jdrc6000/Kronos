<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Kronos</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #080808;
            --s1: #0e0e0e;
            --s2: #141414;
            --s3: #1c1c1c;
            --b1: #1a1a1a;
            --b2: #242424;
            --b3: #333;
            --t1: #888;
            --t2: #555;
            --t3: #2e2e2e;
            --ff: 'IBM Plex Mono', monospace
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--t1);
            font-family: var(--ff);
            font-size: 13px
        }

        @keyframes fi {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fi .8s ease both
        }

        .wordmark {
            font-size: .75rem;
            letter-spacing: .55em;
            color: var(--t3);
            text-transform: uppercase;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 1.2rem
        }

        .wordmark-sep {
            height: 0.5px;
            width: 40px;
            background: var(--b2)
        }

        .lock-card {
            width: 100%;
            max-width: 340px;
            border: 0.5px solid var(--b2)
        }

        .lock-card-section {
            padding: 1rem 1.2rem;
            border-bottom: 0.5px solid var(--b1)
        }

        .lock-card-section:last-child {
            border-bottom: none
        }

        .field-hint {
            font-size: .58rem;
            letter-spacing: .2em;
            color: var(--t3);
            text-transform: uppercase;
            margin-bottom: .5rem
        }

        input[type="password"],
        input[type="text"],
        input[type="search"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 0.5px solid var(--b2);
            color: var(--t1);
            font-family: var(--ff);
            font-size: .82rem;
            padding: .4rem 1.8rem .4rem 0;
            outline: none;
            letter-spacing: .06em;
            transition: border-color .2s
        }

        input:focus {
            border-bottom-color: var(--t2)
        }

        input::placeholder {
            color: var(--t3)
        }

        .input-wrap {
            position: relative
        }

        .eye-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--t3);
            cursor: pointer;
            font-size: .7rem;
            transition: color .15s
        }

        .eye-btn:hover {
            color: var(--t1)
        }

        .btn-primary {
            width: 100%;
            padding: .7rem;
            background: transparent;
            border: 0.5px solid var(--b2);
            color: var(--t2);
            font-family: var(--ff);
            font-size: .65rem;
            letter-spacing: .35em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s
        }

        .btn-primary:hover {
            border-color: var(--t2);
            color: var(--t1)
        }

        .btn-primary:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        .status-msg {
            font-size: .6rem;
            letter-spacing: .1em;
            min-height: 1rem;
            padding: .3rem 0
        }

        .status-msg.error {
            color: #664444
        }

        .status-msg.info {
            color: var(--t3)
        }

        .settings-hint {
            font-size: .55rem;
            letter-spacing: .15em;
            color: var(--t3);
            text-align: center;
            padding-top: .5rem
        }

        .settings-hint a {
            color: var(--t3);
            text-decoration: none
        }

        .settings-hint a:hover {
            color: var(--t2)
        }

        #vault-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: .65rem 1.5rem;
            border-bottom: 0.5px solid var(--b1);
            background: var(--s1)
        }

        .topbar-brand {
            font-size: .65rem;
            letter-spacing: .45em;
            color: var(--t3);
            margin-right: 2rem
        }

        .topbar-meta {
            flex: 1;
            display: flex;
            gap: 2rem;
            font-size: .55rem;
            letter-spacing: .15em;
            color: var(--t3)
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem
        }

        .save-indicator {
            font-size: .55rem;
            letter-spacing: .12em;
            color: var(--t3);
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .save-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--t3)
        }

        .save-dot.saving {
            background: #666;
            animation: blink .7s infinite
        }

        .save-dot.saved {
            background: #3a5c3a
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .2
            }
        }

        .btn-sm {
            background: transparent;
            border: 0.5px solid var(--b1);
            color: var(--t3);
            font-family: var(--ff);
            font-size: .55rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            padding: .28rem .7rem;
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
            display: inline-block
        }

        .btn-sm:hover {
            border-color: var(--b3);
            color: var(--t2)
        }

        .btn-sm.danger:hover {
            border-color: #443333;
            color: #776666
        }

        .vault-body {
            flex: 1;
            display: grid;
            grid-template-columns: 240px 1px 1fr;
            height: calc(100vh - 41px)
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            background: var(--s1);
            overflow: hidden
        }

        .sidebar-search {
            padding: .5rem .8rem;
            border-bottom: 0.5px solid var(--b1)
        }

        .sidebar-search input {
            border-bottom: 0.5px solid var(--b1);
            font-size: .72rem;
            letter-spacing: .04em
        }

        .entry-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--b2) transparent
        }

        .entry-item {
            padding: .55rem .8rem;
            border-bottom: 0.5px solid var(--b1);
            cursor: pointer;
            transition: background .1s;
            display: flex;
            align-items: flex-start;
            gap: .5rem
        }

        .entry-item:hover {
            background: var(--s2)
        }

        .entry-item.active {
            background: var(--s2);
            border-left: 0.5px solid var(--t2)
        }

        .entry-index {
            font-size: .52rem;
            color: var(--t3);
            min-width: 18px;
            padding-top: 1px;
            flex-shrink: 0
        }

        .entry-info {
            flex: 1;
            min-width: 0
        }

        .entry-name {
            font-size: .75rem;
            color: var(--t2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: .06em
        }

        .entry-item.active .entry-name {
            color: var(--t1)
        }

        .entry-username {
            font-size: .6rem;
            color: var(--t3);
            margin-top: .1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .entry-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--b3);
            font-size: .6rem;
            opacity: 0;
            transition: all .15s;
            flex-shrink: 0;
            font-family: var(--ff)
        }

        .entry-item:hover .entry-delete-btn {
            opacity: 1
        }

        .entry-delete-btn:hover {
            color: #664444
        }

        .zero-state {
            padding: 2rem .8rem;
            font-size: .58rem;
            color: var(--t3);
            letter-spacing: .12em;
            text-transform: uppercase;
            text-align: center;
            line-height: 2.2
        }

        .sidebar-footer {
            padding: .6rem .8rem;
            border-top: 0.5px solid var(--b1)
        }

        .btn-add {
            width: 100%;
            background: transparent;
            border: 0.5px solid var(--b1);
            color: var(--t3);
            font-family: var(--ff);
            font-size: .58rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            padding: .45rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-add:hover {
            border-color: var(--b3);
            color: var(--t2)
        }

        .col-div {
            background: var(--b1)
        }

        .detail-panel {
            overflow-y: auto;
            padding: 2rem;
            background: var(--bg)
        }

        .empty-state {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .empty-state-text {
            font-size: .58rem;
            letter-spacing: .25em;
            color: var(--t3);
            text-transform: uppercase
        }

        .detail-card {
            display: none;
            animation: fi .2s ease both
        }

        .detail-card.visible {
            display: block
        }

        .detail-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 0.5px solid var(--b1)
        }

        .detail-site-name {
            font-size: .95rem;
            letter-spacing: .12em;
            color: var(--t1)
        }

        .detail-site-url {
            font-size: .58rem;
            color: var(--t3);
            margin-top: .2rem;
            letter-spacing: .04em
        }

        .btn-edit {
            background: none;
            border: 0.5px solid var(--b1);
            color: var(--t3);
            font-family: var(--ff);
            font-size: .55rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .25rem .6rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-edit:hover {
            border-color: var(--b3);
            color: var(--t2)
        }

        .data-group {
            margin-bottom: 1rem
        }

        .data-group-label {
            font-size: .52rem;
            letter-spacing: .25em;
            color: var(--t3);
            text-transform: uppercase;
            margin-bottom: .4rem
        }

        .data-row {
            display: flex;
            align-items: stretch;
            border: 0.5px solid var(--b1)
        }

        .data-label {
            font-size: .55rem;
            letter-spacing: .15em;
            color: var(--t3);
            text-transform: uppercase;
            padding: .45rem .6rem;
            background: var(--s1);
            border-right: 0.5px solid var(--b1);
            min-width: 90px;
            display: flex;
            align-items: center
        }

        .data-value {
            flex: 1;
            padding: .45rem .6rem;
            font-size: .78rem;
            color: var(--t1);
            word-break: break-all
        }

        .data-value.masked {
            letter-spacing: .18em;
            color: var(--t3)
        }

        .data-actions {
            display: flex;
            border-left: 0.5px solid var(--b1)
        }

        .data-btn {
            background: none;
            border: none;
            border-left: 0.5px solid var(--b1);
            cursor: pointer;
            padding: 0 .6rem;
            font-family: var(--ff);
            font-size: .52rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--t3);
            transition: color .15s;
            white-space: nowrap
        }

        .data-btn:first-child {
            border-left: none
        }

        .data-btn:hover,
        .data-btn.copied {
            color: var(--t1)
        }

        .pw-strength {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .25rem .6rem;
            border: 0.5px solid var(--b1);
            border-top: none;
            margin-bottom: .8rem
        }

        .pw-strength-bar {
            flex: 1;
            height: 1px;
            background: var(--b2)
        }

        .pw-strength-fill {
            height: 100%;
            transition: width .4s, background .4s
        }

        .pw-strength-label {
            font-size: .52rem;
            color: var(--t3);
            letter-spacing: .1em;
            text-transform: uppercase
        }

        .detail-delete-btn {
            font-size: .55rem;
            letter-spacing: .15em;
            color: var(--t3);
            background: none;
            border: 0.5px solid var(--b1);
            font-family: var(--ff);
            text-transform: uppercase;
            padding: .25rem .55rem;
            cursor: pointer;
            transition: all .15s;
            margin-top: 1rem
        }

        .detail-delete-btn:hover {
            border-color: #443333;
            color: #776666
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            z-index: 100;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex;
            animation: fi .15s ease both
        }

        .modal {
            background: var(--s1);
            border: 0.5px solid var(--b2);
            width: 100%;
            max-width: 400px
        }

        .modal-head {
            border-bottom: 0.5px solid var(--b1);
            padding: .6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .modal-title {
            font-size: .62rem;
            letter-spacing: .25em;
            color: var(--t2);
            text-transform: uppercase
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--t3);
            cursor: pointer;
            font-family: var(--ff);
            font-size: .8rem;
            transition: color .15s
        }

        .modal-close:hover {
            color: var(--t1)
        }

        .modal-body {
            padding: 1.2rem 1rem
        }

        .field-label {
            display: block;
            font-size: .55rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--t3);
            margin-bottom: .3rem
        }

        .field-group {
            margin-bottom: .9rem
        }

        .modal-body input {
            background: var(--s2);
            border: 0.5px solid var(--b1);
            padding: .45rem .6rem;
            padding-right: 2rem
        }

        .gen-btn {
            width: 100%;
            margin-top: .4rem;
            background: transparent;
            border: 0.5px dashed var(--b2);
            color: var(--t3);
            font-family: var(--ff);
            font-size: .58rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .35rem;
            cursor: pointer;
            transition: all .15s
        }

        .gen-btn:hover {
            border-color: var(--t3);
            color: var(--t2)
        }

        .modal-actions {
            display: flex;
            border-top: 0.5px solid var(--b1)
        }

        .modal-btn {
            flex: 1;
            padding: .6rem;
            background: transparent;
            border: none;
            border-right: 0.5px solid var(--b1);
            color: var(--t3);
            cursor: pointer;
            font-family: var(--ff);
            font-size: .58rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            transition: all .15s
        }

        .modal-btn:last-child {
            border-right: none
        }

        .modal-btn:hover {
            color: var(--t2)
        }

        .modal-btn.primary {
            color: var(--t2)
        }

        .modal-btn.primary:hover {
            color: var(--t1)
        }

        #toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--s2);
            border: 0.5px solid var(--b2);
            color: var(--t2);
            padding: .4rem 1rem;
            font-size: .6rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 1px solid var(--b3);
            border-top-color: var(--t2);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: .4rem
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        ::-webkit-scrollbar {
            width: 3px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--b2)
        }
    </style>
</head>

<body>
    <div id="lock-screen">
        <div class="wordmark">
            <div class="wordmark-sep"></div>K·R·O·N·O·S<div class="wordmark-sep"></div>
        </div>
        <div class="lock-card">
            <div class="lock-card-section">
                <div class="field-hint">passphrase</div>
                <div class="input-wrap"><input type="password" id="master-pw" autocomplete="current-password"
                        placeholder="" /><button class="eye-btn" onclick="K.togglePwVisibility('master-pw')">👁</button>
                </div>
            </div>
            <div class="lock-card-section"><button class="btn-primary" id="unlock-btn"
                    onclick="K.unlock()">unlock</button>
                <div class="status-msg info" id="lock-status"></div>
            </div>
            <div class="lock-card-section">
                <div class="settings-hint"><a href="../settings.html">change theme</a></div>
            </div>
        </div>
    </div>
    <div id="vault-screen">
        <div class="topbar">
            <div class="topbar-brand">K·R·O·N·O·S</div>
            <div class="topbar-meta"><span>entries — <span id="entry-count">0</span></span></div>
            <div class="topbar-actions">
                <div class="save-indicator">
                    <div class="save-dot saved" id="save-dot"></div><span id="save-label">saved</span>
                </div>
                <a href="../settings.html" class="btn-sm">theme</a>
                <button class="btn-sm danger" onclick="K.lock()">lock</button>
            </div>
        </div>
        <div class="vault-body">
            <div class="sidebar">
                <div class="sidebar-search"><input type="search" id="search-input" placeholder="search"
                        oninput="K.renderList()" /></div>
                <div class="entry-list" id="entry-list">
                    <div class="zero-state" id="zero-state">no entries</div>
                </div>
                <div class="sidebar-footer"><button class="btn-add" onclick="K.openAddModal()">+ add entry</button>
                </div>
            </div>
            <div class="col-div"></div>
            <div class="detail-panel">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-text">select entry</div>
                </div>
                <div class="detail-card" id="detail-card">
                    <div class="detail-header">
                        <div>
                            <div class="detail-site-name" id="detail-name"></div>
                            <div class="detail-site-url" id="detail-url-val"></div>
                        </div>
                        <button class="btn-edit" onclick="K.openEditModal()">edit</button>
                    </div>
                    <div class="data-group" id="detail-username-section">
                        <div class="data-group-label">identity</div>
                        <div class="data-row">
                            <div class="data-label">username</div>
                            <div class="data-value" id="detail-username-val"></div>
                            <div class="data-actions"><button class="data-btn"
                                    onclick="copyValEl('detail-username-val',this)">copy</button></div>
                        </div>
                    </div>
                    <div class="data-group">
                        <div class="data-group-label">authentication</div>
                        <div class="data-row">
                            <div class="data-label">password</div>
                            <div class="data-value masked" id="detail-pw-val">••••••••••••</div>
                            <div class="data-actions"><button class="data-btn" id="pw-reveal-btn"
                                    onclick="K.toggleReveal()">show</button><button class="data-btn"
                                    onclick="K.copyPassword()">copy</button></div>
                        </div>
                        <div class="pw-strength">
                            <div class="pw-strength-bar">
                                <div class="pw-strength-fill" id="pw-strength-fill"></div>
                            </div><span class="pw-strength-label" id="pw-strength-label"></span>
                        </div>
                    </div>
                    <div class="data-group" id="detail-notes-section" style="display:none">
                        <div class="data-group-label">notes</div>
                        <div class="data-row">
                            <div class="data-label">memo</div>
                            <div class="data-value" id="detail-notes-val"></div>
                        </div>
                    </div>
                    <button class="detail-delete-btn" onclick="deleteActive()">delete record</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-head">
                <div class="modal-title" id="modal-title">new entry</div><button class="modal-close"
                    onclick="K.closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="field-group"><label class="field-label" for="m-site">site</label><input type="text"
                        id="m-site" placeholder="github.com" /></div>
                <div class="field-group"><label class="field-label" for="m-url">url</label><input type="text" id="m-url"
                        placeholder="https://" /></div>
                <div class="field-group"><label class="field-label" for="m-user">username</label><input type="text"
                        id="m-user" placeholder="you@example.com" /></div>
                <div class="field-group"><label class="field-label" for="m-pw">password</label>
                    <div class="input-wrap"><input type="password" id="m-pw" placeholder="password" /><button
                            class="eye-btn" onclick="K.togglePwVisibility('m-pw')">👁</button></div><button
                        class="gen-btn" onclick="genPw()">generate password</button>
                </div>
                <div class="field-group" style="margin-bottom:0"><label class="field-label"
                        for="m-notes">notes</label><input type="text" id="m-notes" placeholder="optional" /></div>
            </div>
            <div class="modal-actions"><button class="modal-btn" onclick="K.closeModal()">cancel</button><button
                    class="modal-btn primary" onclick="doSave()">save</button></div>
        </div>
    </div>
    <div id="toast"></div>
    <script src="kronos-core.js"></script>
    <script>
        const K = window.KronosCore;
        K.init({
            masterPwInput: document.getElementById('master-pw'), lockScreen: document.getElementById('lock-screen'), vaultScreen: document.getElementById('vault-screen'), searchInput: document.getElementById('search-input'), entryCountEl: document.getElementById('entry-count'),
            onStatus(m, t) { const el = document.getElementById('lock-status'); el.textContent = m; el.className = 'status-msg ' + t; },
            onUnlockLoading(l) { const b = document.getElementById('unlock-btn'); b.disabled = l; b.innerHTML = l ? '<span class="spinner"></span>unlocking' : 'unlock'; },
            onSaveState(s) { const d = document.getElementById('save-dot'), l = document.getElementById('save-label'); if (s === 'saving') { d.className = 'save-dot saving'; l.textContent = 'saving'; } else if (s === 'saved') { d.className = 'save-dot saved'; l.textContent = 'saved'; } else { d.className = 'save-dot'; l.textContent = 'error'; } },
            onToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); },
            onRenderList(ids, vault, activeId) { const el = document.getElementById('entry-list'), zs = document.getElementById('zero-state'); el.querySelectorAll('.entry-item').forEach(n => n.remove()); zs.style.display = Object.keys(vault).length === 0 ? 'block' : 'none'; ids.forEach((id, i) => { const e = vault[id], d = document.createElement('div'); d.className = 'entry-item' + (id === activeId ? ' active' : ''); d.dataset.id = id; d.innerHTML = `<span class="entry-index">${String(i + 1).padStart(2, '0')}</span><div class="entry-info"><div class="entry-name">${K.esc(e.site)}</div><div class="entry-username">${K.esc(e.username || '—')}</div></div><button class="entry-delete-btn" onclick="K.deleteEntry('${id}')">✕</button>`; d.addEventListener('click', ev => { if (!ev.target.classList.contains('entry-delete-btn')) K.showDetail(id); }); el.insertBefore(d, zs); }); },
            onShowDetail(id, entry) { const card = document.getElementById('detail-card'), empty = document.getElementById('empty-state'); if (!entry) { card.classList.remove('visible'); empty.style.display = 'flex'; return; } empty.style.display = 'none'; card.classList.add('visible'); document.getElementById('detail-name').textContent = entry.site; document.getElementById('detail-url-val').textContent = entry.url || ''; const us = document.getElementById('detail-username-section'); if (entry.username) { us.style.display = 'block'; document.getElementById('detail-username-val').textContent = entry.username; } else us.style.display = 'none'; const pwEl = document.getElementById('detail-pw-val'); pwEl.textContent = '••••••••••••'; pwEl.className = 'data-value masked'; document.getElementById('pw-reveal-btn').textContent = 'show'; const sc = K.strengthScore(entry.password); document.getElementById('pw-strength-fill').style.cssText = `width:${sc.pct}%;background:${sc.color}`; document.getElementById('pw-strength-label').textContent = sc.label; const ns = document.getElementById('detail-notes-section'); if (entry.notes) { ns.style.display = 'block'; document.getElementById('detail-notes-val').textContent = entry.notes; } else ns.style.display = 'none'; },
            onToggleReveal(r, pw) { const el = document.getElementById('detail-pw-val'), btn = document.getElementById('pw-reveal-btn'); if (r) { el.textContent = pw; el.className = 'data-value'; btn.textContent = 'hide'; } else { el.textContent = '••••••••••••'; el.className = 'data-value masked'; btn.textContent = 'show'; } },
            onOpenModal(e) { document.getElementById('modal-title').textContent = e ? 'edit entry' : 'new entry'; document.getElementById('m-site').value = e?.site || ''; document.getElementById('m-url').value = e?.url || ''; document.getElementById('m-user').value = e?.username || ''; document.getElementById('m-pw').value = e?.password || ''; document.getElementById('m-notes').value = e?.notes || ''; document.getElementById('modal-overlay').classList.add('open'); setTimeout(() => document.getElementById('m-site').focus(), 50); },
            onCloseModal() { document.getElementById('modal-overlay').classList.remove('open'); }
        });
        function doSave() { K.saveEntry({ site: document.getElementById('m-site').value.trim(), url: document.getElementById('m-url').value.trim(), username: document.getElementById('m-user').value.trim(), password: document.getElementById('m-pw').value, notes: document.getElementById('m-notes').value.trim() }); }
        function genPw() { const pw = K.generatePassword(), el = document.getElementById('m-pw'); el.value = pw; el.type = 'text'; setTimeout(() => el.type = 'password', 2000); }
        function copyValEl(id, btn) { K.copyField(document.getElementById(id).textContent); const o = btn.textContent; btn.textContent = 'copied'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = o; btn.classList.remove('copied'); }, 1500); }
        function deleteActive() { const id = K.getActiveId(); if (id) K.deleteEntry(id); }
    </script>
</body>

</html>
